[storage]
db_path = "data/app.sqlite3"
upload_dir = "data/uploads"
index_cache_dir = "data/index_cache"

[admin]
session_hours = 8
password_hash_file = "data/admin_password.hash"
signing_secret_file = "data/admin_signing_secret"

[limits]
upload_max_bytes = 104857600
jsonl_max_line_bytes = 1048576
field_max_text_chars = 200000

[jobs]
poll_seconds = 2
rewrite_concurrency = 32
embedding_concurrency = 4
embedding_batch_size = 128

[api]
request_timeout = 240

[search]
top_per_doc_view = 50
top_retrieval = 200
top_display = 20
rerank_top_k = 0
beta = 0.75
default_rerank = true
rerank_range_floor = 0.1
embedding_range_floor = 0.05

[index_cache]
load_mode = "mmap"
activation_drain_timeout_seconds = 30

[audit]
retention_days = 9999

[audit.pricing.deepseek."deepseek-v4-flash"]
input_price_per_1m_tokens_microusd = 100000
output_price_per_1m_tokens_microusd = 300000

[audit.pricing.openrouter."Qwen/Qwen3-Embedding-8B"]
input_price_per_1m_tokens_microusd = 10000

[audit.pricing.deepinfra."Qwen/Qwen3-Reranker-8B"]
input_price_per_1m_tokens_microusd = 50000

[models.rewrite]
model = "deepseek-v4-flash"
identity = "deepseek-v4-flash"
url = "https://api.deepseek.com/chat/completions"
api_key_env = "DEEPSEEK_API_KEY"

[models.embedding]
model = "Qwen/Qwen3-Embedding-8B"
url = "https://openrouter.ai/api/v1/embeddings"
api_key_env = "OPENROUTER_API_KEY"

[models.rerank]
model = "Qwen/Qwen3-Reranker-8B"
url = "https://api.deepinfra.com/v1/inference/{model}"
api_key_env = "DEEPINFRA_API_KEY"
